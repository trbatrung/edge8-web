<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Leadership just doubled</title>
<desc>The job of leadership is now two halves of equal size: the half you know, leading people, and the half that arrived, directing AI. Most companies are still staffed for only the first half.</desc>
<style>.ff{font-family:'Inter',system-ui,-apple-system,sans-serif}.eb{letter-spacing:3px}</style>
<rect width="680" height="420" rx="20" fill="#04102D"/>
<text class="ff eb" x="340" y="56" text-anchor="middle" fill="#6FF2C1" font-size="12" font-weight="500">THE OTHER 50% OF LEADERSHIP</text>
<text class="ff" x="340" y="96" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="600">Leadership just doubled</text>
<text class="ff" x="340" y="124" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="14">Same job, now in two halves. Most companies still staff for one.</text>
<g class="ff">
 <rect x="45" y="156" width="285" height="210" rx="16" fill="#0A1A38" stroke="#287BE8" stroke-width="2"/>
 <text class="eb" x="69" y="192" fill="#5AA0F5" font-size="11" font-weight="500">THE HALF YOU KNOW</text>
 <text x="69" y="224" fill="#FFFFFF" font-size="20" font-weight="600">Lead people</text>
 <circle cx="73" cy="252" r="2.5" fill="#5AA0F5"/><text x="86" y="257" fill="rgba(255,255,255,0.6)" font-size="13">Hire well</text>
 <circle cx="73" cy="278" r="2.5" fill="#5AA0F5"/><text x="86" y="283" fill="rgba(255,255,255,0.6)" font-size="13">Build a culture people stay in</text>
 <circle cx="73" cy="304" r="2.5" fill="#5AA0F5"/><text x="86" y="309" fill="rgba(255,255,255,0.6)" font-size="13">Set direction</text>
 <circle cx="73" cy="330" r="2.5" fill="#5AA0F5"/><text x="86" y="335" fill="rgba(255,255,255,0.6)" font-size="13">Hold people accountable</text>

 <rect x="350" y="156" width="285" height="210" rx="16" fill="#0A1A38" stroke="#6FF2C1" stroke-width="2"/>
 <text class="eb" x="374" y="192" fill="#6FF2C1" font-size="11" font-weight="500">THE HALF THAT ARRIVED</text>
 <text x="374" y="224" fill="#FFFFFF" font-size="20" font-weight="600">Direct AI</text>
 <circle cx="378" cy="252" r="2.5" fill="#6FF2C1"/><text x="391" y="257" fill="rgba(255,255,255,0.6)" font-size="13">Workflow design</text>
 <circle cx="378" cy="278" r="2.5" fill="#6FF2C1"/><text x="391" y="283" fill="rgba(255,255,255,0.6)" font-size="13">Information architecture</text>
 <circle cx="378" cy="304" r="2.5" fill="#6FF2C1"/><text x="391" y="309" fill="rgba(255,255,255,0.6)" font-size="13">Writing instructions for AI</text>
 <circle cx="378" cy="330" r="2.5" fill="#6FF2C1"/><text x="391" y="335" fill="rgba(255,255,255,0.6)" font-size="13">Measured in pull requests</text>
</g>
<rect x="308" y="246" width="64" height="30" rx="15" fill="#04102D" stroke="#6FF2C1" stroke-width="1.5"/>
<text class="ff" x="340" y="266" text-anchor="middle" fill="#6FF2C1" font-size="13" font-weight="700">50 / 50</text>
<text class="ff" x="340" y="400" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="13.5">None of the first half goes away. The second is what almost nobody is hiring for.</text>
</svg>
