<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>What to do next: audit, restructure, hire</title>
<desc>Three moves in order. First audit where you really are. Then restructure into four offices on one central database. Then hire the AI officers and AI engineers your structure is missing. Each move earns the next.</desc>
<style>.ff{font-family:'Inter',system-ui,-apple-system,sans-serif}.eb{letter-spacing:3px}</style>
<rect width="680" height="380" rx="20" fill="#04102D"/>
<text class="ff eb" x="340" y="54" text-anchor="middle" fill="#6FF2C1" font-size="12" font-weight="500">WHAT TO DO NEXT</text>
<text class="ff" x="340" y="92" text-anchor="middle" fill="#FFFFFF" font-size="27" font-weight="600">Three moves, in order</text>
<text class="ff" x="340" y="118" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-size="14">Each one earns the next.</text>
<g class="ff">
 <rect x="40" y="150" width="180" height="180" rx="14" fill="#0A1A38" stroke="#287BE8" stroke-width="2"/>
 <text x="60" y="192" fill="#5AA0F5" font-size="22" font-weight="700">01</text>
 <text x="60" y="222" fill="#FFFFFF" font-size="17" font-weight="600">Audit</text>
 <text x="60" y="252" fill="rgba(255,255,255,0.6)" font-size="12.5">Map where you</text>
 <text x="60" y="270" fill="rgba(255,255,255,0.6)" font-size="12.5">really are, not the</text>
 <text x="60" y="288" fill="rgba(255,255,255,0.6)" font-size="12.5">org-chart version.</text>
 <text x="60" y="318" fill="#5AA0F5" font-size="12.5" font-weight="600">Before any hire</text>

 <rect x="250" y="150" width="180" height="180" rx="14" fill="#0A1A38" stroke="#6FF2C1" stroke-width="2"/>
 <text x="270" y="192" fill="#6FF2C1" font-size="22" font-weight="700">02</text>
 <text x="270" y="222" fill="#FFFFFF" font-size="17" font-weight="600">Restructure</text>
 <text x="270" y="252" fill="rgba(255,255,255,0.6)" font-size="12.5">Four offices on</text>
 <text x="270" y="270" fill="rgba(255,255,255,0.6)" font-size="12.5">one central</text>
 <text x="270" y="288" fill="rgba(255,255,255,0.6)" font-size="12.5">database.</text>
 <text x="270" y="318" fill="#6FF2C1" font-size="12.5" font-weight="600">Out of people's heads</text>

 <rect x="460" y="150" width="180" height="180" rx="14" fill="#0A1A38" stroke="#D1458B" stroke-width="2"/>
 <text x="480" y="192" fill="#E06AA6" font-size="22" font-weight="700">03</text>
 <text x="480" y="222" fill="#FFFFFF" font-size="17" font-weight="600">Hire</text>
 <text x="480" y="252" fill="rgba(255,255,255,0.6)" font-size="12.5">AI officers to run it,</text>
 <text x="480" y="270" fill="rgba(255,255,255,0.6)" font-size="12.5">AI engineers to</text>
 <text x="480" y="288" fill="rgba(255,255,255,0.6)" font-size="12.5">build it.</text>
 <text x="480" y="318" fill="#E06AA6" font-size="12.5" font-weight="600">The roles you're missing</text>

 <path d="M228 240 H242" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
 <path d="M236 234 L244 240 L236 246 Z" fill="rgba(255,255,255,0.4)"/>
 <path d="M438 240 H452" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
 <path d="M446 234 L454 240 L446 246 Z" fill="rgba(255,255,255,0.4)"/>
</g>
<text class="ff" x="340" y="362" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="13.5">Audit before you hire either one, so you buy the capability your structure actually calls for.</text>
</svg>
