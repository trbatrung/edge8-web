<svg width="680" height="360" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
<title>The non-technical person is done</title>
<desc>You don't write the code, you direct it. Prompts are instructions and AI writes. Directing AI is the new technical.</desc>
<style>.ff{font-family:'Inter',system-ui,-apple-system,sans-serif}.eb{letter-spacing:3px}</style>
<rect width="680" height="360" rx="20" fill="#04102D"/>
<text class="ff eb" x="340" y="66" text-anchor="middle" fill="#FF6B35" font-size="12" font-weight="500">THE EXCUSE JUST EXPIRED</text>
<text class="ff" x="340" y="138" text-anchor="middle" fill="#FFFFFF" font-size="36" font-weight="700">The non-technical person</text>
<text class="ff" x="340" y="184" text-anchor="middle" fill="#D1458B" font-size="36" font-weight="700">is done</text>
<text class="ff" x="340" y="246" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-size="16">You don't write the code. You direct it.</text>
<text class="ff" x="340" y="272" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-size="16">Prompts are instructions. You say what you want, and AI writes.</text>
<text class="ff" x="340" y="322" text-anchor="middle" fill="#6FF2C1" font-size="15" font-weight="600">Directing AI is the new technical</text>
</svg>
